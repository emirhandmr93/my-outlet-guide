name: Import Outlet Media

on:
  workflow_dispatch:
    inputs:
      manifestPath:
        description: Path to the outlet media manifest JSON file.
        required: true
        default: media-sources/batch-a-parndorf.sample.json
      commitChanges:
        description: Commit imported media changes back to the current branch.
        required: true
        default: true
        type: boolean
      promoteMetadata:
        description: Promote imported assets into media metadata and local requires after import.
        required: true
        default: true
        type: boolean

permissions:
  contents: write

env:
  MANIFEST_PATH: ${{ inputs.manifestPath }}
  COMMIT_CHANGES: ${{ inputs.commitChanges }}
  PROMOTE_METADATA: ${{ inputs.promoteMetadata }}

jobs:
  import-outlet-media:
    name: Import outlet media
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.13.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install image conversion tooling
        run: |
          sudo apt-get update
          sudo apt-get install -y imagemagick
          if command -v magick >/dev/null 2>&1; then
            magick -version
          else
            convert -version
          fi

      - name: Detect best-effort official manifest
        id: manifest
        run: |
          if node -e "const fs=require('fs'); const p=process.env.MANIFEST_PATH; const m=JSON.parse(fs.readFileSync(p,'utf8')); process.exit(m.bestEffortOfficial === true ? 0 : 1)"; then
            echo "best_effort_official=true" >> "$GITHUB_OUTPUT"
            echo "promote_manifest=.tmp/imported-official-manifest.json" >> "$GITHUB_OUTPUT"
          else
            echo "best_effort_official=false" >> "$GITHUB_OUTPUT"
            echo "promote_manifest=$MANIFEST_PATH" >> "$GITHUB_OUTPUT"
          fi

      - name: Dry-run outlet media import
        run: |
          EXTRA_ARGS=""
          if [ "${{ steps.manifest.outputs.best_effort_official }}" = "true" ]; then
            EXTRA_ARGS="--best-effort-official"
          fi
          npx tsx tools/importOutletMedia.ts "$MANIFEST_PATH" --dry-run $EXTRA_ARGS

      - name: Import outlet media
        run: |
          EXTRA_ARGS=""
          if [ "${{ steps.manifest.outputs.best_effort_official }}" = "true" ]; then
            EXTRA_ARGS="--best-effort-official"
          fi
          npx tsx tools/importOutletMedia.ts "$MANIFEST_PATH" --overwrite $EXTRA_ARGS

      - name: Promote imported outlet media metadata
        if: ${{ inputs.promoteMetadata == true }}
        run: npx tsx tools/promoteImportedOutletMedia.ts "${{ steps.manifest.outputs.promote_manifest }}"

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Validate master data
        run: npx tsx src/services/masterDataValidator.ts

      - name: Check outlet media metadata
        run: npx tsx tools/checkOutletMediaMetadata.ts

      - name: Audit outlet media resolver
        run: npx tsx tools/checkOutletMediaMetadata.ts --resolver-audit

      - name: Check whitespace errors
        run: git diff --check

      - name: Show changed files
        run: |
          if [ -z "$(git status --porcelain)" ]; then
            echo "No changed files from outlet media import."
          else
            git status --short
          fi

      - name: Upload changed files artifact
        if: ${{ inputs.commitChanges == false }}
        uses: actions/upload-artifact@v4
        with:
          name: outlet-media-import-diff
          path: |
            assets/outlet-images/**
            src/media/outletMedia.ts
            src/media/outletMediaMetadata.ts
            media-sources/official-operator/reports/**
          if-no-files-found: ignore

      - name: Commit imported media
        if: ${{ inputs.commitChanges == true }}
        run: |
          if [ -z "$(git status --porcelain)" ]; then
            echo "No changed files to commit; outlet media import produced no diff."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/outlet-images src/media/outletMedia.ts src/media/outletMediaMetadata.ts media-sources/official-operator/reports
          git commit -m "Import outlet media from manifest"
          git push
